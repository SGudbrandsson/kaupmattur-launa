      - text: Vísitala neysluverðs, Hagstofa Íslands (tafla VIS01000, grunnur 1988=100)
      - text: Gögn sótt 12. júní 2026
  - generic [ref=e46]: Þessi síða safnar engum upplýsingum. Launin þín verða eftir í vafranum þínum — þar sem þau eiga heima.