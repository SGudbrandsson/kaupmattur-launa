  - generic [ref=e38]:
    - heading "Hvernig er þetta reiknað?" [level=2] [ref=e39]
    - paragraph [ref=e40]: Við notum vísitölu neysluverðs frá Hagstofu Íslands — sömu vísitölu og er notuð til verðtryggingar. Hún mælir hvað vörur og þjónusta kosta í hverjum mánuði og er áreiðanlegasti mælikvarðinn á það hvað krónan kaupir í raun.
    - paragraph [ref=e41]: "Útreikningurinn er einfaldur: kaupmáttur launa sem voru sett í tilteknum mánuði er launin margfölduð með vísitölunni þá og deilt með vísitölunni nú. Ef vísitalan hefur hækkað um 7% frá því launin voru sett, kaupa þau um 7% minna í dag."
    - generic [ref=e42]: kaupmáttur = laun × vísitala þá ÷ vísitala nú
    - generic [ref=e43]:
      - generic [ref=e44]: Gögn til og með maí 2026
